version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: webapp-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appmanager
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - webapp-network-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webapp-backend-dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appmanager
      JWT_SECRET: dev-secret-key
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - webapp-network-dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: node server.js
    restart: unless-stopped

volumes:
  postgres_data_dev:

networks:
  webapp-network-dev:
    driver: bridge